name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions

      - name: Set up Node.js
        uses: actions
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/lab-nodejs-app:latest .

      - name: Log in to GitHub Container Registry
        uses: docker
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/lab-nodejs-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/nodejs-deployment nodejs-container=ghcr.io/${{ github.repository }}/lab-nodejs-app:latest
          kubectl rollout status deployment/nodejs-deployment
